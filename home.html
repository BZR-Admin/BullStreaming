<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bull Streaming - Catálogo Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .bull-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.05); }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .dot-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="pb-24">

    <div class="glass sticky top-0 z-50 p-4 border-b border-white/5 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic text-orange-500 tracking-tighter">BULL STREAMING</h1>
            <p id="txt-actualizacion" class="text-[8px] uppercase text-slate-500 font-bold">Actualizando...</p>
        </div>
        <div id="status-badge" class="flex items-center gap-2 bg-slate-900/50 px-3 py-1.5 rounded-full border border-white/10">
            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-500"></div>
            <span id="status-text" class="text-[10px] font-black uppercase tracking-wider text-slate-300">Cargando</span>
        </div>
    </div>

    <div class="p-4 max-w-md mx-auto">
        
        <div class="flex bg-slate-900 p-1 rounded-2xl mb-6 border border-white/5">
            <button onclick="setMode('cliente')" id="btn-cliente" class="flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all bg-orange-600 text-white shadow-lg">Clientes</button>
            <button onclick="setMode('revendedor')" id="btn-revendedor" class="flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all text-slate-500">Revendedores</button>
        </div>

        <div class="bull-card p-5 rounded-3xl mb-8 shadow-2xl border-t-2 border-t-orange-500/30">
            <h3 class="text-xs font-black uppercase text-orange-500 mb-3 tracking-widest text-center">Consultar mis cuentas</h3>
            <div class="flex gap-2">
                <input type="tel" id="input-tel" placeholder="593963908286" class="flex-1 bg-slate-800 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-orange-500 transition-all">
                <button onclick="consultarCuentas()" class="bg-white text-black px-4 rounded-xl font-black text-xs uppercase hover:bg-orange-500 hover:text-white transition-all">Buscar</button>
            </div>
            <div id="res-busqueda" class="mt-4 hidden space-y-2"></div>
        </div>

        <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-4 pl-2">Servicios Disponibles</h2>
        <div id="grid-servicios" class="grid grid-cols-1 gap-4">
            </div>

    </div>

    <div class="fixed bottom-6 left-0 right-0 px-4 flex gap-3 justify-center">
        <button onclick="window.location.href='#'" class="bg-slate-800/90 backdrop-blur border border-white/10 px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-2xl">Ver Evidencias</button>
        <button onclick="window.location.href='https://wa.me/593963908286'" class="bg-green-600 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-2xl shadow-green-900/40 flex items-center gap-2">
            Escríbenos
        </button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxlhHQKzQgtu38GVJ5OWC-19bD6vj6XA_ht3SHorGPNzdxl24mvda5p0rrllAb-lbLRXw/exec"; // PEGA TU URL DE GOOGLE AQUÍ
        let dataStock = [];
        let modo = 'cliente';

        window.onload = loadData;

        async function loadData() {
            const res = await fetch(`${WEB_APP_URL}?action=getPublicData`);
            const data = await res.json();
            dataStock = data.stock;
            
            // Renderizar Semáforo
            const s = data.config.estado;
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            
            if(s === 'Verde') { dot.className = 'w-2.5 h-2.5 rounded-full bg-green-500 dot-pulse'; txt.innerText = 'Atención Inmediata'; }
            else if(s === 'Amarillo') { dot.className = 'w-2.5 h-2.5 rounded-full bg-yellow-500'; txt.innerText = 'Atención Intermitente'; }
            else { dot.className = 'w-2.5 h-2.5 rounded-full bg-red-500'; txt.innerText = 'Atención Pausada'; }

            document.getElementById('txt-actualizacion').innerText = `Catálogo actualizado: ${new Date(data.config.actualizacion).toLocaleDateString()}`;
            renderServicios();
        }

        function setMode(m) {
            modo = m;
            document.getElementById('btn-cliente').className = m === 'cliente' ? 'flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all bg-orange-600 text-white shadow-lg' : 'flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all text-slate-500';
            document.getElementById('btn-revendedor').className = m === 'revendedor' ? 'flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all bg-yellow-600 text-white shadow-lg' : 'flex-1 py-3 rounded-xl text-xs font-black uppercase transition-all text-slate-500';
            renderServicios();
        }

        function renderServicios() {
            const container = document.getElementById('grid-servicios');
            container.innerHTML = dataStock.map(s => {
                const precio = modo === 'cliente' ? s[1] : s[2];
                const disponible = s[3] === 'S';
                return `
                    <div class="bull-card p-4 rounded-3xl flex justify-between items-center ${!disponible ? 'opacity-50 grayscale' : ''}">
                        <div>
                            <h4 class="font-black text-white uppercase text-sm leading-none">${s[0]}</h4>
                            <p class="text-[10px] font-bold mt-1 ${modo === 'cliente' ? 'text-orange-500' : 'text-yellow-500'}">
                                ${disponible ? '$' + parseFloat(precio).toFixed(2) : 'Agotado'}
                            </p>
                        </div>
                        <div class="text-[10px] font-black uppercase px-4 py-2 rounded-xl border ${disponible ? 'border-orange-500/50 text-orange-500' : 'border-slate-700 text-slate-500'}">
                            ${disponible ? 'Disponible' : 'Sin Stock'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function consultarCuentas() {
            const tel = document.getElementById('input-tel').value;
            if(!tel) return;
            const resDiv = document.getElementById('res-busqueda');
            resDiv.innerHTML = '<p class="text-[10px] text-center animate-pulse">Buscando...</p>';
            resDiv.classList.remove('hidden');

            const response = await fetch(`${WEB_APP_URL}?action=getUserSubs&tel=${tel}`);
            const subs = await response.json();

            if(subs.length === 0) {
                resDiv.innerHTML = '<p class="text-[10px] text-red-400 text-center uppercase font-bold">No se encontraron cuentas activas</p>';
            } else {
                resDiv.innerHTML = subs.map(sub => `
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-white/5">
                        <p class="text-[10px] font-black text-white uppercase">${sub.servicio}</p>
                        <p class="text-[9px] text-slate-400">Perfil: ${sub.perfil}</p>
                        <p class="text-[9px] text-orange-500 font-bold uppercase">Vence: ${new Date(sub.vence).toLocaleDateString()}</p>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
