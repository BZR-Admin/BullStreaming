<!DOCTYPE html>
<html lang="es">
<head>
  <!-- 1. Manifest -->
<link rel="manifest" href="./manifest.json" />

<!-- 2. Ícono explícito (soluciona el logo en pantalla de inicio) -->
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-192.png" />

<!-- 3. Color de barra del sistema -->
<meta name="theme-color" content="#00c6ff" />

<!-- 4. Registrar Service Worker -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js")
        .then(() => console.log("SW registrado ✓"))
        .catch(e => console.warn("SW error:", e));
    });
  }
</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva Compra | Bull Streaming</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- BOTÓN MENÚ -->
<button id="fab" type="button">☰</button>

<!-- MENÚ -->
<nav id="sideMenu" class="side-menu">
 <button type="button" onclick="location.href='index.html'">🏠 Inicio</button>
  <button type="button" onclick="location.href='ventas.html'">🛒 Ventas</button>
  <button type="button" onclick="location.href='compras.html'">📦 Compras</button>
  <button type="button" onclick="location.href='cuentas.html'">🎬 Cuentas</button>
  <button type="button" onclick="location.href='registros.html'">📊 Registros</button>
  <button type="button" onclick="location.href='clientes_proveedores.html'">👥 Clientes</button>
</nav>

<header style="margin-bottom:15px;">
  <h1>Nueva Compra</h1>
</header>

<div class="form">

  <!-- STEP 1: Plataforma -->
  <label for="plataforma">Plataforma</label>
  <select id="plataforma">
    <option value="">Selecciona plataforma</option>
  </select>

  <!-- STEP 2: Servicio (se habilita al elegir plataforma) -->
  <label for="servicio">Servicio</label>
  <select id="servicio" disabled>
    <option value="">Selecciona servicio</option>
  </select>

  <!-- STEP 3: Proveedor (se habilita al elegir servicio) -->
  <label for="proveedor">Proveedor</label>
  <select id="proveedor" disabled>
    <option value="">Selecciona proveedor</option>
  </select>

  <!-- STEP 4: Correo -->
  <label for="correo">Correo / Usuario de la cuenta</label>
  <input id="correo" type="email" placeholder="ejemplo@correo.com" autocomplete="off" />

  <!-- STEP 5: Fecha vencimiento -->
  <label for="vencimiento">Fecha de vencimiento</label>
  <input id="vencimiento" type="date" />

  <button onclick="saveCompra()">Guardar compra</button>

</div>

<script type="module" src="compras.js"></script>
<script>
  const fab = document.getElementById("fab");
  const menu = document.getElementById("sideMenu");

  fab.onclick = () => {
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
  };

  document.addEventListener("click", (e) => {
    if (!menu.contains(e.target) && !fab.contains(e.target)) {
      menu.style.display = "none";
    }
  });
</script>

</body>
</html>
