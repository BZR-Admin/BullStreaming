<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bull Admin - Control de Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .card-bull { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .loader { border-top-color: #f97316; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 pb-24">

    <div id="loading-overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center">
        <div class="loader w-12 h-12 border-4 border-slate-700 rounded-full mb-4"></div>
        <p class="text-xs font-bold uppercase tracking-widest text-slate-500">Sincronizando con Bull Sheet...</p>
    </div>

    <div class="mb-8 text-center">
        <h1 class="text-3xl font-black tracking-tighter text-orange-500 uppercase italic">Bull Admin</h1>
        <p id="last-update" class="text-slate-500 text-[10px] uppercase font-bold mt-1">Cargando última actualización...</p>
    </div>

    <div class="card-bull p-5 rounded-3xl mb-6 shadow-2xl">
        <h2 class="text-[10px] font-black mb-4 uppercase text-slate-400 tracking-[0.2em] text-center">Estado de Atención</h2>
        <div class="grid grid-cols-3 gap-2">
            <button onclick="setStatus('Verde')" class="py-3 bg-green-600/20 text-green-500 border border-green-600/50 rounded-2xl active:bg-green-600 active:text-white transition-all text-[10px] font-black uppercase">Inmediata</button>
            <button onclick="setStatus('Amarillo')" class="py-3 bg-yellow-600/20 text-yellow-500 border border-yellow-600/50 rounded-2xl active:bg-yellow-600 active:text-white transition-all text-[10px] font-black uppercase">Media</button>
            <button onclick="setStatus('Rojo')" class="py-3 bg-red-600/20 text-red-500 border border-red-600/50 rounded-2xl active:bg-red-600 active:text-white transition-all text-[10px] font-black uppercase">Pausada</button>
        </div>
    </div>

    <div id="servicios-container" class="space-y-4"></div>

    <script>
        // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxlhHQKzQgtu38GVJ5OWC-19bD6vj6XA_ht3SHorGPNzdxl24mvda5p0rrllAb-lbLRXw/exec";

        window.onload = fetchData;

        async function fetchData() {
            document.getElementById('loading-overlay').classList.remove('hidden');
            try {
                const response = await fetch(`${WEB_APP_URL}?action=getPublicData`);
                const data = await response.json();
                renderServicios(data.stock);
                document.getElementById('last-update').innerText = `Actualizado: ${new Date(data.config.actualizacion).toLocaleString()}`;
                document.getElementById('loading-overlay').classList.add('hidden');
            } catch (e) {
                alert("Error de conexión. Revisa que la Web App de Google esté publicada para 'Anyone'.");
            }
        }

        function renderServicios(servicios) {
            const container = document.getElementById('servicios-container');
            container.innerHTML = servicios.map(s => `
                <div class="card-bull p-5 rounded-3xl shadow-xl border-l-4 ${s[3] === 'S' ? 'border-l-green-500' : 'border-l-red-500'}">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-black text-lg text-white uppercase leading-none">${s[0]}</h3>
                            <p class="text-[10px] font-bold uppercase mt-1 ${s[3] === 'S' ? 'text-green-500' : 'text-red-500'} italic">
                                ${s[3] === 'S' ? '● Disponible' : '○ Agotado'}
                            </p>
                        </div>
                        <button onclick="toggleStock('${s[0]}', '${s[3]}')" 
                                class="px-4 py-2 rounded-xl text-[10px] font-black uppercase border transition-all
                                ${s[3] === 'S' ? 'bg-red-500/10 text-red-500 border-red-500/50' : 'bg-green-500/10 text-green-500 border-green-600/50'}">
                            ${s[3] === 'S' ? 'Quitar Stock' : 'Poner Stock'}
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-700">
                            <label class="text-[8px] uppercase font-black text-slate-500 block mb-1">Precio Cliente</label>
                            <input type="number" value="${s[1]}" 
                                onblur="updateValue('${s[0]}', 'cliente', this.value)"
                                class="w-full bg-transparent text-sm font-black text-orange-500 focus:outline-none">
                        </div>
                        <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-700">
                            <label class="text-[8px] uppercase font-black text-slate-500 block mb-1">Revendedor</label>
                            <input type="number" value="${s[2]}" 
                                onblur="updateValue('${s[0]}', 'revendedor', this.value)"
                                class="w-full bg-transparent text-sm font-black text-yellow-500 focus:outline-none">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function toggleStock(servicio, actual) {
            const nuevo = actual === 'S' ? 'N' : 'S';
            await postAction({ action: 'updateServicio', servicio, campo: 'stock', valor: nuevo });
            fetchData();
        }

        async function updateValue(servicio, campo, valor) {
            await postAction({ action: 'updateServicio', servicio, campo, valor });
        }

        async function setStatus(color) {
            await postAction({ action: 'updateStatus', color });
            fetchData();
        }

        async function postAction(body) {
            // Usamos el método tradicional de envío para Web Apps de Google
            return fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Necesario para evitar bloqueos de Google
                body: JSON.stringify(body)
            });
        }
    </script>
</body>
</html>
