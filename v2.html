<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bull Streaming – Gestión y Dashboard</title>

  <style>
    :root {
      --bg: #0d0d0d;
      --card-bg: #1a1a1a;
      --primary: #e50914;
      --primary-dark: #a40810;
      --success: #00c851;
      --warning: #ffbb33;
      --danger: #ff4444;
      --text-dark: #f5f5f5;
      --border-radius: 6px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-dark);
    }

    header {
      background: var(--primary);
      padding: 1rem;
      text-align: center;
      color: white;
    }

    nav {
      display: flex;
      justify-content: center;
      background: var(--primary-dark);
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 1rem;
    }

    nav a:hover {
      background: var(--primary);
    }

    main {
      max-width: 1200px;
      margin: auto;
      padding: 1rem;
    }

    .card,
    .kpi {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .col-half {
      flex: 1 1 48%;
      min-width: 250px;
    }

    label {
      display: block;
      margin-top: 0.8rem;
      font-weight: bold;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      padding: 0.7rem;
      margin-top: 0.3rem;
      border-radius: var(--border-radius);
      border: 1px solid #333;
      background: #262626;
      color: white;
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-primary {
      background: var(--primary);
    }

    .btn-success {
      background: var(--success);
    }

    .btn-warning {
      background: var(--warning);
      color: black;
    }

    .btn-danger {
      background: var(--danger);
    }

    .preview {
      background: #222;
      border: 1px solid #444;
      padding: 1rem;
      border-radius: 6px;
      white-space: pre-wrap;
      margin-top: 0.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid #333;
      padding: 0.6rem;
      text-align: left;
    }

    th {
      background: var(--primary-dark);
    }

    tr.libre {
      background: rgba(40, 167, 69, 0.2);
    }

    tr.lleno {
      background: rgba(220, 53, 69, 0.2);
    }

    tr.vence-pronto {
      background: rgba(255, 193, 7, 0.2);
    }

    tr.vence-hoy {
      background: rgba(220, 53, 69, 0.4);
    }

    .kpi-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .kpi {
      flex: 1 1 30%;
    }

    .kpi p {
      font-size: 1.8rem;
      margin: 0.5rem 0 0 0;
      font-weight: bold;
    }

    @media(max-width:800px) {
      .col-half,
      .kpi {
        flex-basis: 100%;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Bull Streaming – Gestión y Dashboard</h1>
</header>

<nav>
  <a href="#venta">Registrar venta</a>
  <a href="#dashboard">Dashboard</a>
</nav>

<main>

  <section id="venta">

    <h2>Registrar nueva venta</h2>

    <div class="card">

      <div class="row">

        <div class="col-half">
          <label>Cliente</label>
          <select id="cliente">
            <option value="" disabled selected>Seleccione un cliente...</option>
          </select>
        </div>

        <div class="col-half">
          <label>Duración (meses)</label>
          <input type="number" id="duracion" min="1" value="1">
        </div>

      </div>

      <label>Mensaje de entrega</label>
      <textarea id="mensaje"></textarea>

      <label>Ganancia ($)</label>
      <input type="number" id="ganancia" step="0.01">

      <label>Fecha vencimiento</label>
      <input type="date" id="vencimiento">

      <label>Previsualización</label>
      <div class="preview" id="preview">
Completa el mensaje y pulsa EXTRAER.
      </div>

      <div class="row" style="margin-top:1rem;">

        <div class="col-half">
          <button class="btn-primary" id="extraer">
            Extraer
          </button>
        </div>

        <div class="col-half">
          <button class="btn-success" id="guardar" disabled>
            Guardar venta
          </button>
        </div>

      </div>

    </div>

  </section>

  <section id="dashboard">

    <h2>Dashboard</h2>

    <div class="kpi-row">

      <div class="kpi">
        <h3>Clientes activos</h3>
        <p id="kpiClientes">0</p>
      </div>

      <div class="kpi">
        <h3>Ventas semana</h3>
        <p id="kpiVentasSemana">0</p>
      </div>

      <div class="kpi">
        <h3>Ganancia mensual</h3>
        <p id="kpiGananciaMes">$0</p>
      </div>

    </div>

  </section>

</main>

<script>

const API_URL = "TU_URL_APPS_SCRIPT";

let clients = [];
let selectedClient = null;
let parsedData = null;

async function loadClients() {

  const select = document.getElementById("cliente");

  select.innerHTML =
    `<option value="" disabled selected>Seleccione un cliente...</option>`;

  try {

    const res = await fetch(API_URL);
    const data = await res.json();

    clients = (data.clientes || []).map(row => ({
      id: String(row[0]),
      name: row[1],
      phone: row[2]
    }));

    clients.forEach(c => {

      const option = document.createElement("option");

      option.value = c.id;
      option.textContent = `${c.id} - ${c.name}`;

      select.appendChild(option);

    });

  } catch(error) {

    console.error("Error cargando clientes:", error);

  }

}

function parseMessage(msg) {

  const lines = msg
    .split(/\r?\n/)
    .map(l => l.trim())
    .filter(Boolean);

  let plataforma = "";
  let correoPerfil = "";
  let fechaExpira = null;

  for(const line of lines) {

    if(!plataforma) {

      const match = line.match(
        /(Netflix|Disney|HBO|Prime|Spotify|Crunchyroll|Paramount)/i
      );

      if(match) {
        plataforma = match[1];
      }

    }

    if(!correoPerfil && line.includes("@")) {
      correoPerfil = line;
    }

    if(!fechaExpira && /Expira/i.test(line)) {

      const match = line.match(/(\d{4})-(\d{2})-(\d{2})/);

      if(match) {

        fechaExpira = new Date(
          Number(match[1]),
          Number(match[2]) - 1,
          Number(match[3])
        );

      }

    }

  }

  if(!plataforma || !correoPerfil || !fechaExpira) {
    return null;
  }

  return {
    plataforma,
    correoPerfil,
    fechaExpira
  };

}

function formatDateInput(date) {

  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");

  return `${y}-${m}-${d}`;

}

document.getElementById("extraer")
.addEventListener("click", () => {

  const clienteId =
    document.getElementById("cliente").value;

  if(!clienteId) {
    alert("Seleccione cliente");
    return;
  }

  selectedClient =
    clients.find(c => String(c.id) === String(clienteId));

  const msg =
    document.getElementById("mensaje").value;

  const res = parseMessage(msg);

  if(!res) {

    document.getElementById("preview").textContent =
      "No se pudo interpretar el mensaje.";

    return;

  }

  document.getElementById("vencimiento").value =
    formatDateInput(res.fechaExpira);

  document.getElementById("preview").textContent =
`Cliente: ${selectedClient.name}
Plataforma: ${res.plataforma}
Correo: ${res.correoPerfil}
Vence: ${res.fechaExpira.toLocaleDateString()}`;

  parsedData = res;

  document.getElementById("guardar").disabled = false;

});

document.getElementById("guardar")
.addEventListener("click", async () => {

  if(!parsedData || !selectedClient) {
    return;
  }

  const fechaInput =
    document.getElementById("vencimiento").value;

  const [y,m,d] =
    fechaInput.split("-").map(Number);

  const fechaVenc =
    new Date(y, m - 1, d);

  const payload = {

    clienteId: selectedClient.id,
    plataforma: parsedData.plataforma,
    correoPerfil: parsedData.correoPerfil,
    fechaVencimiento: fechaVenc.toISOString(),
    ganancia:
      Number(document.getElementById("ganancia").value || 0)

  };

  try {

    const resp = await fetch(API_URL, {

      method: "POST",

      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },

      body: JSON.stringify(payload)

    });

    const result = await resp.json();

    if(result.status === "ok") {

      alert("Venta guardada correctamente");

      resetForm();

      refreshDashboard();

    } else {

      alert("Error guardando");

    }

  } catch(error) {

    console.error(error);

    alert("Error conexión Apps Script");

  }

});

function resetForm() {

  document.getElementById("cliente").selectedIndex = 0;
  document.getElementById("mensaje").value = "";
  document.getElementById("ganancia").value = "";
  document.getElementById("vencimiento").value = "";

  document.getElementById("preview").textContent =
    "Completa el mensaje y pulsa EXTRAER.";

  parsedData = null;
  selectedClient = null;

  document.getElementById("guardar").disabled = true;

}

async function refreshDashboard() {

  try {

    const res = await fetch(API_URL);

    const data = await res.json();

    document.getElementById("kpiClientes").textContent =
      data?.kpi?.totalClientesActivos || 0;

    document.getElementById("kpiVentasSemana").textContent =
      data?.kpi?.totalVentasSemanal || 0;

    const ganancia =
      Number(data?.kpi?.gananciaMensual || 0);

    document.getElementById("kpiGananciaMes").textContent =
      "$" + ganancia.toFixed(2);

  } catch(error) {

    console.error(error);

  }

}

loadClients().then(() => {
  refreshDashboard();
});

</script>

</body>
</html>
