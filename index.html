<!DOCTYPE html>
<html>
<head>
  <title>Bull Streaming</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1 class="title">Bull Streaming</h1>
  <p class="subtitle">Panel de gestión</p>

  <!-- GRID BOTONES -->
  <div class="grid">

    <button onclick="go('ventas.html')">➕ Nueva venta</button>
    <button onclick="go('compras.html')">📦 Nueva compra</button>
    <button onclick="go('registros.html')">📊 Ver registros</button>
    <button onclick="go('cuentas.html')">🎬 Cuentas disponibles</button>

  </div>

  <!-- MENÚ OPCIONES -->
  <div class="card menu-card">

    <label>Más opciones</label>

    <select onchange="navigate(this.value)">
      <option value="">Seleccionar</option>
      <option value="clientes_proveedores.html">👥 Clientes / Proveedores</option>
    </select>

  </div>

</div>

<script>
function go(page){
  window.location.href = page;
}

function navigate(page){
  if(page){
    window.location.href = "pages/" + page;
  }
}
</script>

</body>
</html>
