<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bull Streaming App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <h1 class="text-2xl font-bold text-center text-yellow-500 mb-8">BULL STREAMING 🐂</h1>
        
        <form id="formRegistro" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Nombre del Cliente</label>
                <input type="text" id="cliente" required class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:ring-2 focus:ring-yellow-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Plataforma</label>
                <select id="servicio" class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 outline-none">
                    <option>Netflix</option>
                    <option>Disney+</option>
                    <option>HBO Max</option>
                    <option>Spotify</option>
                    <option>Magis TV</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Meses</label>
                    <input type="number" id="duracion" value="1" min="1" class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Correo/Perfil</label>
                    <input type="text" id="correo" placeholder="Ej: Perfil 1" class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 outline-none">
                </div>
            </div>

            <button type="submit" id="btn" class="w-full py-4 bg-yellow-600 hover:bg-yellow-500 text-white font-bold rounded-xl transition duration-300 shadow-lg">
                REGISTRAR VENTA
            </button>
        </form>
    </div>

    <script>
        const URL_API = "AQUÍ_PEGA_TU_URL_DE_APPS_SCRIPT";

        document.getElementById('formRegistro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            const payload = {
                cliente: document.getElementById('cliente').value,
                servicio: document.getElementById('servicio').value,
                duracion: document.getElementById('duracion').value,
                correo: document.getElementById('correo').value
            };

            try {
                await fetch(URL_API, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                alert("✅ Venta guardada correctamente");
                document.getElementById('formRegistro').reset();
            } catch (err) {
                alert("❌ Error de conexión");
            } finally {
                btn.disabled = false;
                btn.innerText = "REGISTRAR VENTA";
            }
        });
    </script>
</body>
</html>
