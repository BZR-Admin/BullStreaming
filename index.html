<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bull Streaming Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a"> 
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041888.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041888.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-urgent { animation: pulse-red 2s infinite; }
        body { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .search-container { position: sticky; top: 0; z-index: 40; background: #0f172a; padding-bottom: 0.5rem; }
        .btn-sort { font-size: 8px; font-weight: 900; letter-spacing: 0.05em; }
        /* Ocultar barra de scroll pero mantener funcionalidad */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-24 font-sans">

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-slate-800 flex justify-around p-4 z-50 backdrop-blur-lg shadow-2xl">
        <button onclick="showTab('tab-venta')" class="nav-btn text-yellow-500 flex flex-col items-center">
            <span class="text-xl">⚡</span><span class="text-[10px] font-bold uppercase tracking-wider">Venta</span>
        </button>
        <button onclick="showTab('tab-clientes'); cargarClientes();" class="nav-btn text-slate-500 flex flex-col items-center">
            <span class="text-xl">👥</span><span class="text-[10px] font-bold uppercase tracking-wider">Clientes</span>
        </button>
        <button onclick="showTab('tab-registro'); cargarRegistros();" class="nav-btn text-slate-500 flex flex-col items-center">
            <span class="text-xl">📂</span><span class="text-[10px] font-bold uppercase tracking-wider">Historial</span>
        </button>
    </nav>

    <div class="p-4 max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-3xl font-black text-yellow-500 italic uppercase tracking-tighter">Bull Streaming 🐂</h1>
        </header>

        <!-- TAB VENTA -->
        <section id="tab-venta" class="tab-content active">
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl space-y-4">
                <h2 class="text-lg font-bold text-white flex items-center gap-2">🛒 Nueva Suscripción</h2>
                <select id="sel-cliente" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none focus:border-yellow-500 transition-all text-sm">
                    <option value="">Cargando clientes...</option>
                </select>
                <select id="v-servicio" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none focus:border-yellow-500 text-sm">
                    <option>Perfil Normal de Netflix</option>
                    <option>Perfil Extra de Netflix</option>
                    <option>Cuenta Completa de Netflix</option>
                    <option>Perfil de Disney sin ESPN</option>
                    <option>Perfil de Disney Normal</option>
                    <option>Perfil de Disney Especial</option>
                    <option>Cuenta completa de Disney</option>
                    <option>Plan Individual de Spotify</option>
                    <option>Plan Duo de Spotify</option>
                    <option>Perfil de Flujo </option>
                    <option>Cuenta completa de Flujo Tv</option>
                    <option>Perfil de Megax Tv</option>
                    <option>Cuenta completa de Megax Tv</option>
                    <option>Perfil de HBO MAX</option>
                    <option>Cuenta completa de HBO MAX</option>
                    <option>Perfil de Prime Video</option>
                    <option>Cuenta completa de Prime video</option>
                    <option>Perfil de Paramount</option>
                    <option>Cuenta completa de Paramount</option>
                    <option>Plan Pro de Zapping</option>
                    <option>Combo especial de Zapping</option>
                    <option>Plan premium de Youtube</option>
                    <option>Plan premium de Canva</option>
                    <option>Plan premium de CupCut</option>
                    <option>Plan premium de Crunchyroll</option>
                    <option>Plan premium de Dezeer</option>
                    <option>Plan premium de Chat GPT</option>
                </select>
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div>
                        <label class="text-[10px] text-slate-500 ml-2 uppercase">Meses (30 días c/u)</label>
                        <input type="number" id="v-meses" value="1" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 ml-2 uppercase">Correo/perfil</label>
                        <input type="text" id="v-perfil" placeholder="Ej: P2-44" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none">
                    </div>
                </div>
                <button id="btn-venta" onclick="guardarVenta()" class="w-full py-5 bg-yellow-600 font-black rounded-2xl shadow-lg active:scale-95 transition-all uppercase text-sm tracking-widest">
                    REGISTRAR VENTA
                </button>
            </div>
        </section>

        <!-- TAB CLIENTES -->
        <section id="tab-clientes" class="tab-content">
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl space-y-4">
                <h2 class="text-lg font-bold text-white uppercase tracking-tight">👤 Registro de Clientes</h2>
                <input type="text" id="c-nombre" placeholder="Nombre completo" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none text-sm">
                <input type="tel" id="c-tel" placeholder="WhatsApp (Ej: 5939...)" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none text-sm">
                <button id="btn-cliente" onclick="guardarCliente()" class="w-full py-4 bg-indigo-600 font-bold rounded-2xl active:scale-95 transition-all text-sm uppercase tracking-widest">
                    AÑADIR A LA BASE
                </button>
            </div>
        </section>

        <!-- TAB REGISTRO -->
        <section id="tab-registro" class="tab-content">
            <div class="search-container">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-white uppercase tracking-tight">📋 Historial</h2>
                    <button onclick="cargarRegistros()" class="text-yellow-500 text-xs font-bold bg-yellow-500/10 px-3 py-1 rounded-full uppercase">🔄 Refrescar</button>
                </div>
                <div class="relative mb-3">
                    <input type="text" id="buscador-historial" onkeyup="filtrarRegistros()" placeholder="Buscar cliente, servicio o correo..." class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-700 outline-none focus:border-yellow-500 transition-all text-sm pl-11 shadow-inner">
                    <span class="absolute left-4 top-4 opacity-50">🔍</span>
                </div>
                
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                    <button onclick="ordenar('vence', 'asc')" class="btn-sort flex-shrink-0 bg-slate-800 px-3 py-2 rounded-lg border border-slate-700 uppercase">Vence ↑</button>
                    <button onclick="ordenar('vence', 'desc')" class="btn-sort flex-shrink-0 bg-slate-800 px-3 py-2 rounded-lg border border-slate-700 uppercase">Vence ↓</button>
                    <button onclick="ordenar('creado', 'asc')" class="btn-sort flex-shrink-0 bg-slate-800 px-3 py-2 rounded-lg border border-slate-700 uppercase">Registro ↑</button>
                    <button onclick="ordenar('creado', 'desc')" class="btn-sort flex-shrink-0 bg-slate-800 px-3 py-2 rounded-lg border border-slate-700 uppercase">Registro ↓</button>
                </div>
            </div>
            <div id="lista-registros" class="space-y-4"></div>
        </section>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxlhHQKzQgtu38GVJ5OWC-19bD6vj6XA_ht3SHorGPNzdxl24mvda5p0rrllAb-lbLRXw/exec";
        let registrosLocales = [];

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-yellow-500', 'text-slate-500'));
            document.getElementById(tabId).classList.add('active');
            if (event && event.currentTarget && event.currentTarget.classList) {
                event.currentTarget.classList.replace('text-slate-500', 'text-yellow-500');
            }
        }

        async function cargarClientes() {
            try {
                const res = await fetch(`${API_URL}?action=getClientes`);
                const data = await res.json();
                document.getElementById('sel-cliente').innerHTML = '<option value="">Seleccione Cliente</option>' + 
                    data.map(c => `<option value="${c[1]}">${c[1]}</option>`).join('');
            } catch (e) { console.error("Error al cargar clientes"); }
        }

        async function guardarVenta() {
            const btn = document.getElementById('btn-venta');
            const cliente = document.getElementById('sel-cliente').value;
            const meses = document.getElementById('v-meses').value;
            
            if(!cliente) return alert("Selecciona un cliente");
            
            btn.disabled = true; btn.innerText = "PROCESANDO...";

            const hoy = new Date();
            hoy.setHours(0,0,0,0); 
            
            const fechaVencimiento = new Date(hoy.getTime());
            fechaVencimiento.setDate(hoy.getDate() + (parseInt(meses) * 30));
            fechaVencimiento.setHours(0,0,0,0);

            const payload = { 
                action: "addVenta", 
                cliente: cliente, 
                servicio: document.getElementById('v-servicio').value, 
                duracion: meses, 
                correo: document.getElementById('v-perfil').value,
                fechaCalculada: fechaVencimiento.toISOString()
            };

            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert(`✅ Venta Registrada. Vence el: ${fechaVencimiento.toLocaleDateString()}`);
            btn.disabled = false; btn.innerText = "REGISTRAR VENTA";
            document.getElementById('v-perfil').value = "";
        }

        async function guardarCliente() {
            const btn = document.getElementById('btn-cliente');
            const nombre = document.getElementById('c-nombre').value;
            if(!nombre) return alert("Falta nombre");

            btn.disabled = true;
            const payload = { action: "addCliente", nombre: nombre, telefono: document.getElementById('c-tel').value };
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("✅ Cliente Guardado");
            btn.disabled = false;
            document.getElementById('c-nombre').value = ""; document.getElementById('c-tel').value = "";
            cargarClientes();
        }

        async function cargarRegistros() {
            const container = document.getElementById('lista-registros');
            container.innerHTML = '<p class="text-center text-slate-600 text-[10px] uppercase tracking-widest mt-10">Sincronizando registros...</p>';
            
            try {
                const res = await fetch(`${API_URL}?action=getRegistros`);
                const data = await res.json();
                registrosLocales = data;
                ordenar('vence', 'asc');
            } catch (e) { container.innerHTML = '<p class="text-red-500 text-center text-[10px]">Error al cargar historial</p>'; }
        }

        function ordenar(criterio, direccion) {
            registrosLocales.sort((a, b) => {
                let valA, valB;
                if (criterio === 'vence') {
                    valA = new Date(a[5]);
                    valB = new Date(b[5]);
                } else if (criterio === 'creado') {
                    valA = new Date(a[3]);
                    valB = new Date(b[3]);
                }
                return direccion === 'asc' ? valA - valB : valB - valA;
            });
            filtrarRegistros();
        }

        function filtrarRegistros() {
            const termino = document.getElementById('buscador-historial').value.toLowerCase();
            const filtrados = registrosLocales.filter(r => {
                const nombre = r[0].toString().toLowerCase();
                const servicio = r[1].toString().toLowerCase();
                const correo = r[2].toString().toLowerCase();
                return nombre.includes(termino) || servicio.includes(termino) || correo.includes(termino);
            });
            renderizarRegistros(filtrados);
        }

        function renderizarRegistros(lista) {
            const container = document.getElementById('lista-registros');
            if(lista.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-600 text-[10px] uppercase py-10">Sin resultados</p>';
                return;
            }

            container.innerHTML = lista.map(r => {
                const fVence = new Date(r[5]);
                fVence.setHours(0,0,0,0);
                const hoy = new Date();
                hoy.setHours(0,0,0,0);
                const diff = Math.ceil((fVence - hoy) / (1000 * 60 * 60 * 24));
                
                let color = "border-slate-800", label = "Suscripción Activa", labelColor = "text-green-500";
                if(diff <= 0) { 
                    color = "border-red-600 bg-red-950/20 animate-urgent text-red-200"; 
                    label = "RENOVAR HOY (DÍA 30) 🚨"; 
                    labelColor = "text-red-500 font-black";
                } else if(diff <= 3) { 
                    color = "border-yellow-500 bg-yellow-500/10 text-yellow-200"; 
                    label = "AVISO PREVIO (DÍA 27+) ⏳"; 
                    labelColor = "text-yellow-500 font-black";
                }

                const msgWA = encodeURIComponent(`Hola *${r[0]}*, Bull Streaming te informa que tu *${r[1]} (${r[2]})* vence el *${fVence.toLocaleDateString()}*. ¿Deseas renovar?`);

                return `
                    <div class="p-4 rounded-3xl border-l-8 ${color} bg-slate-900 shadow-xl relative">
                        <div class="flex justify-between items-start mb-1">
                            <div>
                                <h3 class="font-bold text-white text-lg tracking-tight">${r[0]}</h3>
                                <p class="text-yellow-500 text-[10px] font-black uppercase tracking-widest">${r[1]}</p>
                            </div>
                            <!-- ELIMINAR CON CONFIRMACIÓN -->
                            <button onclick="eliminarVenta('${r[0]}','${r[2]}')" class="bg-slate-800 p-2 rounded-full hover:bg-red-600 transition-colors">🗑️</button>
                        </div>
                        
                        <div class="mt-3 space-y-1 text-xs text-slate-400">
                            <p class="flex justify-between border-b border-slate-800/50 pb-1"><span>Correo/Perfil:</span> <span class="text-slate-100 font-mono font-bold">${r[2]}</span></p>
                            <p class="flex justify-between border-b border-slate-800/50 pb-1"><span>Vence el:</span> <span class="text-slate-100 font-bold">${fVence.toLocaleDateString()}</span></p>
                            <p class="${labelColor} text-[10px] pt-1 uppercase tracking-tighter font-bold">${label}</p>
                        </div>

                        <div class="mt-4 grid grid-cols-2 gap-3">
                            <button onclick="editarVenta('${r[0]}','${r[2]}','${r[5]}')" class="py-3 bg-slate-800 text-slate-400 text-[9px] font-black rounded-xl border border-slate-700 uppercase">✏️ Editar</button>
                            <a href="https://wa.me/${r[7]}?text=${msgWA}" target="_blank" class="py-3 bg-green-600 text-white text-[9px] font-black rounded-xl text-center uppercase">💬 Avisar</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function editarVenta(cliente, correoOrig, fechaOrig) {
            const nuevoCorreo = prompt("Nuevo Correo/Perfil:", correoOrig);
            const nuevaFechaStr = prompt("Nueva fecha de vencimiento (AAAA-MM-DD):", new Date(fechaOrig).toISOString().split('T')[0]);
            if(nuevoCorreo && nuevaFechaStr) {
                const body = { action: "editVenta", cliente: cliente, correoOriginal: correoOrig, nuevoCorreo: nuevoCorreo, nuevaFecha: nuevaFechaStr };
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(body) });
                alert("Cambio solicitado. Sincronizando...");
                setTimeout(cargarRegistros, 1500);
            }
        }

        // FUNCIÓN DE ELIMINACIÓN CORREGIDA
        async function eliminarVenta(cliente, correo) {
            if(confirm(`¿Estás seguro de eliminar el registro de ${cliente} (${correo})?`)) {
                const body = { action: "deleteVenta", cliente: cliente, correo: correo };
                
                // 1. Efecto visual inmediato (Opcional: borrar el elemento del DOM o poner mensaje)
                console.log("Eliminando...");
                
                // 2. Enviar a Google
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(body) });
                
                // 3. Avisar al usuario
                alert("Eliminación procesada. Recargando historial...");
                
                // 4. IMPORTANTE: Esperar 1.5 segundos para dar tiempo a la Sheet de actualizarse antes de pedir los datos de nuevo
                setTimeout(() => {
                    cargarRegistros();
                }, 1500);
            }
        }

        window.onload = cargarClientes;
    </script>
</body>
</html>
