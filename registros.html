<!DOCTYPE html>
<html lang="es">
<head>
  <!-- 1. Manifest -->
<link rel="manifest" href="./manifest.json" />

<!-- 2. Ícono explícito (soluciona el logo en pantalla de inicio) -->
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-192.png" />

<!-- 3. Color de barra del sistema -->
<meta name="theme-color" content="#00c6ff" />

<!-- 4. Registrar Service Worker -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js")
        .then(() => console.log("SW registrado ✓"))
        .catch(e => console.warn("SW error:", e));
    });
  }
</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registros | Bull Streaming</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- BOTÓN MENÚ -->
<button id="fab">☰</button>

<!-- MENÚ -->
<nav id="sideMenu" class="side-menu">

  <button type="button" onclick="location.href='index.html'">🏠 Inicio</button>
  <button type="button" onclick="location.href='ventas.html'">🛒 Ventas</button>
  <button type="button" onclick="location.href='compras.html'">📦 Compras</button>
  <button type="button" onclick="location.href='cuentas.html'">🎬 Cuentas</button>
  <button type="button" onclick="location.href='registros.html'">📊 Registros</button>
  <button type="button" onclick="location.href='clientes_proveedores.html'">👥 Clientes</button>
  <button onclick="location.href='dashboard.html'">📈 Dashboard</button>

</nav>

  <!-- =========================
     TÍTULO
========================= -->
<header style="margin-bottom:15px;">
  <h1>Registro de ventas</h1>
</header>

<!-- =========================
     CONTROLES (SOLO LOS QUE SIRVEN)
========================= -->
<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">

  <!-- BUSCADOR -->
  <input
    id="search"
    type="text"
    placeholder="Buscar cliente, plataforma, correo, perfil..."
    style="flex:1; padding:10px; border-radius:10px;"
  />

  <!-- FILTRO PLATAFORMA -->
  <select id="filterPlatform" style="padding:10px; border-radius:10px;">
    <option value="">Todas las plataformas</option>
  </select>

  <!-- ORDEN -->
  <select id="sortBy" style="padding:10px; border-radius:10px;">
    <option value="fecha_vencimiento">Ordenar por vencimiento</option>
    <option value="fecha_registro">Ordenar por registro</option>
  </select>

</div>

<!-- =========================
     CONTENEDOR
========================= -->
<div id="container"></div>

<!-- JS -->
<script type="module" src="registros.js"></script>

<!-- MENU SCRIPT -->
<script>
const fab = document.getElementById("fab");
const menu = document.getElementById("sideMenu");

fab.onclick = () => {
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
};
</script>

</body>
</html>
