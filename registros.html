<!DOCTYPE html>
<html>
<head>
  <title>Registros</title>
  <link rel="stylesheet" href="style.css">
</head>


<!-- FLOAT MENU BUTTON -->
<div id="fab" onclick="toggleMenu()">☰</div>

<!-- MENU PANEL -->
<div id="sideMenu" class="side-menu">

  <button onclick="go('index.html')">➕ Inicio</button>
  <button onclick="go('ventas.html')">➕ Nueva venta</button>
  <button onclick="go('compras.html')">📦 Nueva compra</button>
  <button onclick="go('cuentas.html')">🎬 Cuentas disponibles</button>
  <button onclick="go('registros.html')">📊 Registros</button>
  <button onclick="go('clientes_proveedores.html')">👥 Clientes / Proveedores</button>

</div>
  
<body>

<h2>Registros de Ventas</h2>

<!-- FILTROS -->
<select id="filterPlatform">
  <option value="">Plataforma</option>
</select>

<input id="search" placeholder="Buscar...">

<button onclick="sortBy('fecha_registro')">Orden Registro</button>
<button onclick="sortBy('fecha_vencimiento')">Orden Vencimiento</button>

<div id="container"></div>

<script type="module" src="registros.js"></script>
<script>
window.toggleMenu = function () {
  const menu = document.getElementById("sideMenu");
  menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
};

window.go = function (page) {
  window.location.href = page;
};

// cerrar si das click fuera
document.addEventListener("click", function (e) {
  const menu = document.getElementById("sideMenu");
  const fab = document.getElementById("fab");

  if (!menu || !fab) return;

  if (!menu.contains(e.target) && !fab.contains(e.target)) {
    menu.style.display = "none";
  }
});
</script>
</body>
</html>
