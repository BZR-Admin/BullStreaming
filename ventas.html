<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="stylepanel.css">
  <title>Ventas</title>
</head>

<body>

<div class="container">

  <h2>💰 SISTEMA DE VENTAS</h2>

  <!-- tipo de venta -->
  <button onclick="setType('VI')">Venta Independiente</button>
  <button onclick="setType('VCP')">Cuenta Propia</button>

  <br><br>

  <textarea id="textInput" placeholder="Pega aquí el texto de la cuenta..." rows="10"></textarea>

  <br>

  <button onclick="processText()">🔍 Detectar</button>
  <button onclick="clearText()">🧹 Limpiar</button>

</div>

<script type="module" src="ventasdb.js"></script>

</body>
</html>
