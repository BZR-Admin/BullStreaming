<!DOCTYPE html>
<html lang="es">
<head>
 <!-- 1. Manifest -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva Venta | Bull Streaming</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-header { margin-bottom: 20px; }
    .page-header h2 {
      margin-bottom: 2px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-header p { font-size: 13px; opacity: 0.6; }

    .mode-switch {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-soft);
      border-radius: 14px; padding: 5px;
    }
    .mode-switch button {
      min-width: 0; border-radius: 10px; border: none;
      background: transparent; color: rgba(255,255,255,0.55);
      font-size: 13.5px; font-weight: 600; box-shadow: none; transition: all 0.2s;
    }
    .mode-switch button:hover { transform: none; box-shadow: none; color: white; background: rgba(255,255,255,0.06); }
    .mode-switch button.active-vi  { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 0 16px rgba(0,198,255,0.3); }
    .mode-switch button.active-vcp { background: linear-gradient(135deg, var(--purple), var(--pink)); color: white; box-shadow: 0 0 16px rgba(168,85,247,0.3); }

    .parser-trigger {
      width: 100%; margin-bottom: 16px;
      background: transparent; border: 1px dashed rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.55); font-weight: 600; font-size: 13.5px;
      box-shadow: none; border-radius: 12px;
    }
    .parser-trigger:hover { border-color: var(--primary); color: var(--primary); background: rgba(0,198,255,0.05); transform: none; box-shadow: none; }

    .form-card {
      background: var(--bg-card); border: 1px solid var(--border-soft);
      border-radius: 18px; padding: clamp(16px, 4vw, 24px);
      box-shadow: var(--shadow-soft); backdrop-filter: blur(12px);
    }
    .form-card label {
      display: block; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.45); margin-top: 4px; margin-bottom: 0;
    }
    .form-card input, .form-card select { margin: 5px 0 0; }
    .form-card .grid { gap: 12px; margin-bottom: 0; }
    .form-card hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 18px 0 16px; }

    .btn-save {
      width: 100%; font-size: 15px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none; border-radius: 12px;
    }
    .btn-save.vcp-mode { background: linear-gradient(135deg, var(--purple), var(--pink)); box-shadow: 0 0 20px rgba(168,85,247,0.3); }

    #fieldProveedor { display: none; }

    .mode-badge {
      display: inline-block; font-size: 11px; font-weight: 800;
      padding: 3px 10px; border-radius: 99px;
      background: rgba(0,198,255,0.15); color: var(--primary);
      border: 1px solid rgba(0,198,255,0.3); margin-left: 10px;
      vertical-align: middle; letter-spacing: 0.04em; -webkit-text-fill-color: var(--primary);
    }
    .mode-badge.vcp { background: rgba(168,85,247,0.15); color: var(--purple); border-color: rgba(168,85,247,0.3); -webkit-text-fill-color: var(--purple); }

    /* ── BUSCADOR DE CLIENTE ── */
    .cliente-search-wrap {
      position: relative;
    }
    .cliente-search-wrap input {
      width: 100%;
      box-sizing: border-box;
    }
    .cliente-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: rgba(10, 12, 28, 0.98);
      border: 1px solid rgba(0,198,255,0.25);
      border-radius: 12px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
    }
    .cliente-dropdown.open { display: block; }
    .cliente-option {
      padding: 10px 14px;
      font-size: 13.5px;
      font-weight: 500;
      color: rgba(255,255,255,0.82);
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
    }
    .cliente-option:last-child { border-bottom: none; }
    .cliente-option:hover, .cliente-option.focused {
      background: rgba(0,198,255,0.12);
      color: white;
    }
    .cliente-option mark {
      background: transparent;
      color: var(--primary);
      font-weight: 700;
    }
    .cliente-empty {
      padding: 12px 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }
    /* input con cliente seleccionado */
    #clienteSearch.selected {
      color: white;
      border-color: rgba(0,198,255,0.4);
    }
    /* campo oculto que guarda el id real */
    #cliente { display: none; }

    #parserOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 10000;
      align-items: center; justify-content: center;
      padding: 16px; backdrop-filter: blur(4px);
    }
    #parserOverlay.open { display: flex; }
    .parser-inner {
      background: rgba(10, 12, 25, 0.98); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 18px; padding: clamp(16px, 4vw, 22px);
      width: min(100%, 520px); max-height: 88vh; overflow-y: auto;
      display: flex; flex-direction: column; gap: 12px; box-shadow: var(--shadow-soft);
    }
    .parser-inner h3 { font-size: 16px; font-weight: 800; }
    .parser-inner textarea { margin: 0; font-family: monospace; font-size: 13px; }
    .parser-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .parser-actions button {
      min-width: 0; font-size: 13px; padding: 10px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
      color: white; box-shadow: none;
    }
    .parser-actions button:hover { background: rgba(255,255,255,0.1); transform: none; box-shadow: none; }
    .parser-actions .btn-detect { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-color: transparent; box-shadow: 0 0 16px rgba(0,198,255,0.25); }
    .parser-actions .btn-detect:hover { opacity: 0.9; }
    body.modal-open { overflow: hidden; }
    @media (max-width: 420px) { .parser-actions { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<button id="fab" type="button">☰</button>

<nav id="sideMenu" class="side-menu">
  <button type="button" onclick="location.href='index.html'">🏠 Inicio</button>
  <button type="button" onclick="location.href='ventas.html'">🛒 Ventas</button>
  <button type="button" onclick="location.href='compras.html'">📦 Compras</button>
  <button type="button" onclick="location.href='cuentas.html'">🎬 Cuentas</button>
  <button type="button" onclick="location.href='registros.html'">📊 Registros</button>
  <button type="button" onclick="location.href='clientes_proveedores.html'">👥 Clientes</button>
  <button onclick="location.href='dashboard.html'">📈 Dashboard</button>
</nav>

<div class="page-header">
  <h2>Nueva Venta <span id="modeBadge" class="mode-badge">VI</span></h2>
  <p>Gestión de ventas VI / VCP</p>
</div>

<div class="mode-switch">
  <button id="btnVI" class="active-vi" onclick="setMode('VI')">Venta Independiente</button>
  <button id="btnVCP" onclick="setMode('VCP')">Cuenta Propia</button>
</div>

<button class="parser-trigger" onclick="toggleParser()">📋 Insertar texto de cuenta</button>

<div class="form-card">
  <div class="grid">

    <div>
      <label>Cliente</label>
      <!-- Buscador visible -->
      <div class="cliente-search-wrap">
        <input
          id="clienteSearch"
          type="text"
          placeholder="Buscar cliente..."
          autocomplete="off"
        />
        <div id="clienteDropdown" class="cliente-dropdown"></div>
      </div>
      <!-- Campo oculto con el id_cliente seleccionado -->
      <input id="cliente" type="hidden" />
    </div>

    <div>
      <label>Plataforma</label>
      <select id="plataforma" onchange="loadServicios()"></select>
    </div>

    <div>
      <label>Servicio</label>
      <select id="servicio"></select>
    </div>

    <div>
      <label>Usuario / Correo</label>
      <input id="correo" type="email" placeholder="correo@ejemplo.com" autocomplete="off" />
    </div>

    <div>
      <label>Perfil</label>
      <input id="perfil" placeholder="Perfil asignado" />
    </div>

    <div>
      <label>Fecha vencimiento</label>
      <input id="vencimiento" type="date" />
    </div>

    <div id="fieldProveedor">
      <label>Proveedor</label>
      <select id="proveedor"></select>
    </div>

    <div>
      <label>Ganancia</label>
      <input id="ganancia" type="number" step="0.01" placeholder="0.00" />
    </div>

  </div>
  <hr />
  <button id="btnSave" class="btn-save" onclick="saveVenta()">💾 Guardar Venta</button>
</div>

<div id="parserOverlay">
  <div class="parser-inner">
    <h3>📋 Insertar texto de cuenta</h3>
    <textarea id="texto" placeholder="Pega aquí el texto de la cuenta..." rows="6"></textarea>
    <div class="parser-actions">
      <button onclick="pasteText()">📋 Pegar</button>
      <button onclick="clearText()">🧹 Limpiar</button>
      <button class="btn-detect" onclick="parseText()">🔍 Detectar datos</button>
      <button onclick="toggleParser()">✕ Cerrar</button>
    </div>
  </div>
</div>

<script type="module" src="ventas.js"></script>

<script>
  // FAB
  const fab  = document.getElementById("fab");
  const menu = document.getElementById("sideMenu");
  fab.onclick = () => menu.style.display = menu.style.display === "flex" ? "none" : "flex";
  document.addEventListener("click", (e) => {
    if (!menu.contains(e.target) && !fab.contains(e.target)) menu.style.display = "none";
  });

  // PARSER
  const parserOverlay = document.getElementById("parserOverlay");
  window.toggleParser = () => {
    parserOverlay.classList.toggle("open");
    document.body.classList.toggle("modal-open", parserOverlay.classList.contains("open"));
  };
  parserOverlay.addEventListener("click", (e) => { if (e.target === parserOverlay) toggleParser(); });

  window.pasteText = async () => {
    const campoTexto = document.getElementById("texto");
    const valorPrevio = campoTexto.value;
    const conLimiteDeTiempo = (promesa, ms) =>
      new Promise((resolve, reject) => {
        const aviso = setTimeout(() => reject(new Error("timeout")), ms);
        promesa.then(v => { clearTimeout(aviso); resolve(v); }, e => { clearTimeout(aviso); reject(e); });
      });
    try {
      if (navigator.clipboard && navigator.clipboard.readText) {
        campoTexto.value = await conLimiteDeTiempo(navigator.clipboard.readText(), 600);
        return;
      }
    } catch {}
    campoTexto.focus();
    try { document.execCommand("paste"); } catch {}
    if (campoTexto.value !== valorPrevio) return;
    campoTexto.select();
    alert("Mantén presionado el cuadro de texto y elegí \"Pegar\" del menú.");
  };
  window.clearText = () => { document.getElementById("texto").value = ""; };
</script>

</body>
</html>
