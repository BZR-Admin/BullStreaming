<!DOCTYPE html>
<html>
<head>
  <title>Nueva Venta</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MENU FLOTANTE -->
<div id="fab" onclick="toggleMenu()">☰</div>

<div id="sideMenu" class="side-menu">
  <button onclick="go('index.html')">Inicio</button>
  <button onclick="go('ventas.html')">Ventas</button>
  <button onclick="go('compras.html')">Compras</button>
  <button onclick="go('cuentas.html')">Cuentas</button>
  <button onclick="go('registros.html')">Registros</button>
  <button onclick="go('clientes_proveedores.html')">Clientes</button>
</div>

<!-- HEADER -->
<div class="header">
  <h2>Nueva Venta</h2>
  <p class="subtitle">Gestión de ventas VI / VCP</p>
</div>

<!-- SWITCH MODE -->
<div class="mode-switch">

  <button class="mode-btn" onclick="setMode('VI')">
    🔵 Venta Independiente
  </button>

  <button class="mode-btn" onclick="setMode('VCP')">
    🟣 Cuenta Propia
  </button>

</div>

<!-- BOTÓN PARSER -->
<div class="parser-btn">
  <button onclick="toggleParser()">📋 Insertar texto de cuenta</button>
</div>

<!-- FORM CARD -->
<div class="form-card">

  <div class="grid">

    <div>
      <label>Cliente</label>
      <select id="cliente"></select>
    </div>

    <div>
      <label>Plataforma</label>
      <select id="plataforma" onchange="loadServicios()"></select>
    </div>

    <div>
      <label>Servicio</label>
      <select id="servicio"></select>
    </div>

    <div>
      <label>Usuario / Correo</label>
      <input id="correo" placeholder="correo@ejemplo.com">
    </div>

    <div>
      <label>Perfil</label>
      <input id="perfil" placeholder="Perfil asignado">
    </div>

    <div>
      <label>Fecha vencimiento</label>
      <input id="vencimiento" type="date">
    </div>

    <div>
      <label>Proveedor (VCP)</label>
      <select id="proveedor" style="display:none"></select>
    </div>

    <div>
      <label>Ganancia</label>
      <input id="ganancia" placeholder="0.00">
    </div>

  </div>

  <div class="actions">
    <button class="primary" onclick="saveVenta()">💾 Guardar Venta</button>
  </div>

</div>

<!-- PARSER MODAL -->
<div id="parserBox" class="modal" style="display:none">

  <div class="modal-content">

    <h3>Insertar cuenta</h3>

    <textarea id="texto" placeholder="Pega aquí la cuenta..."></textarea>

    <div class="modal-actions">
      <button onclick="pasteText()">📋 Pegar</button>
      <button onclick="clearText()">🧹 Limpiar</button>
      <button onclick="parseText()">🔍 Detectar</button>
      <button onclick="toggleParser()">❌ Cerrar</button>
    </div>

  </div>

</div>

<script type="module" src="ventas.js"></script>

<script>
window.toggleMenu = () => {
  const m = document.getElementById("sideMenu");
  m.style.display = m.style.display === "flex" ? "none" : "flex";
};

window.go = (p) => location.href = p;

window.toggleParser = () => {
  const p = document.getElementById("parserBox");
  p.style.display = p.style.display === "flex" ? "none" : "flex";
};

window.pasteText = async () => {
  const t = await navigator.clipboard.readText();
  document.getElementById("texto").value = t;
};

window.clearText = () => {
  document.getElementById("texto").value = "";
};
</script>

</body>
</html>
