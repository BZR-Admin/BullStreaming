<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Registros de Ventas</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body class="page-registros">

  <!-- =========================
       MENÚ FLOTANTE
  ========================== -->
  <button id="fab" class="fab" type="button" onclick="toggleMenu()" aria-label="Abrir menú">
    ☰
  </button>

  <nav id="sideMenu" class="side-menu" aria-label="Menú principal">
    <button type="button" onclick="go('index.html')">Inicio</button>
    <button type="button" onclick="go('ventas.html')">Ventas</button>
    <button type="button" onclick="go('compras.html')">Compras</button>
    <button type="button" onclick="go('cuentas.html')">Cuentas</button>
    <button type="button" onclick="go('registros.html')">Registros</button>
    <button type="button" onclick="go('clientes_proveedores.html')">Clientes</button>
  </nav>


  <!-- =========================
       CONTENIDO PRINCIPAL
  ========================== -->
  <main class="registros-page">

    <!-- HEADER -->
    <header class="header registros-header">
      <h2>Registros de Ventas</h2>
      <p class="subtitle">
        Consulta, ordena, filtra y gestiona las ventas registradas.
      </p>
    </header>


    <!-- =========================
         FILTROS Y ORDENAMIENTO
    ========================== -->
    <section class="registros-toolbar" aria-label="Filtros de registros">

      <div class="toolbar-row">

        <div class="field field-platform">
          <label for="plataforma" class="sr-only">Filtrar por plataforma</label>

          <select id="plataforma" name="plataforma">
            <option value="">Plataforma</option>
          </select>
        </div>

      </div>

      <div class="toolbar-row">

        <div class="field field-search">
          <label for="search" class="sr-only">Buscar venta</label>

          <input
            id="search"
            name="search"
            type="search"
            autocomplete="off"
            placeholder="Buscar por cliente, plataforma, servicio, correo, perfil, fecha o estado..."
          />
        </div>

      </div>

      <div class="toolbar-row toolbar-actions">

        <button
          id="btnOrdenRegistro"
          class="primary"
          type="button"
          data-sort="fecha_registro"
          aria-label="Ordenar por fecha de registro"
        >
          Orden Registro
        </button>

        <button
          id="btnOrdenVencimiento"
          class="primary"
          type="button"
          data-sort="fecha_vencimiento"
          aria-label="Ordenar por fecha de vencimiento"
        >
          Orden Vencimiento
        </button>

        <button
          id="btnLimpiarFiltros"
          class="secondary"
          type="button"
          aria-label="Limpiar filtros"
        >
          Limpiar
        </button>

      </div>

    </section>


    <!-- =========================
         RESUMEN OPCIONAL
    ========================== -->
    <section id="resumenRegistros" class="resumen-registros" aria-label="Resumen de ventas">

      <div class="resumen-card">
        <span class="resumen-label">Total</span>
        <strong id="totalVentas">0</strong>
      </div>

      <div class="resumen-card">
        <span class="resumen-label">Activas</span>
        <strong id="ventasActivas">0</strong>
      </div>

      <div class="resumen-card">
        <span class="resumen-label">Por vencer</span>
        <strong id="ventasPorVencer">0</strong>
      </div>

      <div class="resumen-card">
        <span class="resumen-label">Vencidas</span>
        <strong id="ventasVencidas">0</strong>
      </div>

    </section>


    <!-- =========================
         ESTADOS DE CARGA
    ========================== -->
    <div id="loader" class="state-box">
      Cargando registros...
    </div>

    <div id="emptyState" class="state-box" hidden>
      No se encontraron ventas con los filtros actuales.
    </div>


    <!-- =========================
         CONTENEDOR DE TARJETAS
    ========================== -->
    <section
      id="container"
      class="registros-grid"
      aria-live="polite"
      aria-label="Lista de registros de ventas"
    >
      <!-- Las tarjetas se generan desde registros.js -->
    </section>

  </main>


  <!-- =========================
       TEMPLATE TARJETA VENTA
       El JS lo puede clonar para mantener el orden exacto:
       1. Cliente
       2. Plataforma / Servicio
       3. Usuario correo
       4. Fecha vencimiento
  ========================== -->
  <template id="ventaCardTemplate">

    <article class="venta-card" tabindex="0">

      <div class="venta-card-main">

        <div class="venta-line venta-cliente">
          <span class="venta-label">Cliente</span>
          <strong data-cliente></strong>
        </div>

        <div class="venta-line venta-servicio">
          <span class="venta-label">Plataforma / Servicio</span>
          <strong data-plataforma-servicio></strong>
        </div>

        <div class="venta-line venta-correo">
          <span class="venta-label">Usuario</span>
          <strong data-usuario-correo></strong>
        </div>

        <div class="venta-line venta-vencimiento">
          <span class="venta-label">Fecha vencimiento</span>
          <strong data-fecha-vencimiento></strong>
        </div>

      </div>

      <div class="venta-card-extra" hidden>

        <div class="venta-extra-info">

          <div>
            <span>Perfil</span>
            <strong data-perfil></strong>
          </div>

          <div>
            <span>Tipo venta</span>
            <strong data-tipo-venta></strong>
          </div>

          <div>
            <span>Fecha registro</span>
            <strong data-fecha-registro></strong>
          </div>

          <div>
            <span>Estado</span>
            <strong data-estado></strong>
          </div>

        </div>

        <div class="venta-actions">

          <button
            class="btn-card btn-whatsapp"
            type="button"
            data-action="whatsapp"
          >
            WhatsApp
          </button>

          <button
            class="btn-card btn-renovar"
            type="button"
            data-action="renovar"
          >
            Renovar
          </button>

          <button
            class="btn-card btn-editar"
            type="button"
            data-action="editar"
          >
            Editar
          </button>

          <button
            class="btn-card btn-eliminar"
            type="button"
            data-action="eliminar"
          >
            Eliminar
          </button>

        </div>

      </div>

    </article>

  </template>


  <!-- =========================
       MODAL EDITAR / RENOVAR
       Lo dejamos listo para el JS.
  ========================== -->
  <div id="ventaModal" class="modal" hidden>

    <div class="modal-content venta-modal-content">

      <div class="modal-header">
        <h3 id="ventaModalTitle">Editar venta</h3>

        <button
          id="btnCerrarModal"
          class="modal-close"
          type="button"
          aria-label="Cerrar"
        >
          ✕
        </button>
      </div>

      <form id="ventaForm">

        <input type="hidden" id="modalIdVenta" />

        <div class="grid">

          <div>
            <label for="modalCliente">Cliente</label>
            <select id="modalCliente" name="modalCliente"></select>
          </div>

          <div>
            <label for="modalPlataforma">Plataforma</label>
            <input id="modalPlataforma" name="modalPlataforma" type="text" readonly />
          </div>

          <div>
            <label for="modalServicio">Servicio</label>
            <input id="modalServicio" name="modalServicio" type="text" readonly />
          </div>

          <div>
            <label for="modalUsuarioCorreo">Usuario / Correo</label>
            <input id="modalUsuarioCorreo" name="modalUsuarioCorreo" type="text" />
          </div>

          <div>
            <label for="modalPerfil">Perfil</label>
            <input id="modalPerfil" name="modalPerfil" type="text" />
          </div>

          <div>
            <label for="modalFechaVencimiento">Fecha vencimiento</label>
            <input id="modalFechaVencimiento" name="modalFechaVencimiento" type="date" />
          </div>

          <div>
            <label for="modalGanancia">Ganancia</label>
            <input id="modalGanancia" name="modalGanancia" type="number" step="0.01" />
          </div>

          <div>
            <label for="modalEstado">Estado</label>
            <select id="modalEstado" name="modalEstado">
              <option value="Activa">Activa</option>
              <option value="Renovada">Renovada</option>
              <option value="Vencida">Vencida</option>
              <option value="Cancelada">Cancelada</option>
            </select>
          </div>

        </div>

        <div class="modal-actions">

          <button id="btnGuardarVenta" class="primary" type="submit">
            Guardar cambios
          </button>

          <button id="btnCancelarModal" class="secondary" type="button">
            Cancelar
          </button>

        </div>

      </form>

    </div>

  </div>


  <!-- =========================
       TOAST / MENSAJES
  ========================== -->
  <div id="toast" class="toast" hidden></div>


  <!-- =========================
       SCRIPT PRINCIPAL
  ========================== -->
  <script type="module" src="registros.js"></script>


  <!-- =========================
       FUNCIONES BÁSICAS DEL MENÚ
       No ponemos sortBy aquí para evitar el error:
       "sortBy is not defined".
       Eso lo manejaremos correctamente en registros.js.
  ========================== -->
  <script>
    window.toggleMenu = () => {
      const menu = document.getElementById("sideMenu");

      if (!menu) return;

      menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    };

    window.go = (page) => {
      location.href = page;
    };
  </script>

</body>
</html>
