<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bull Streaming Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .no-scrollbar::-webkit-scrollbar { display:none; }
    .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
  </style>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen pb-24 font-sans">

<nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-slate-800 flex justify-around p-3 z-50">
  <button onclick="showTab('tab-dashboard')" class="nav-btn text-yellow-500 text-xs font-bold">📊<br>Dashboard</button>
  <button onclick="showTab('tab-venta')" class="nav-btn text-slate-400 text-xs font-bold">🛒<br>Venta</button>
  <button onclick="showTab('tab-clientes')" class="nav-btn text-slate-400 text-xs font-bold">👥<br>Clientes</button>
  <button onclick="showTab('tab-compras')" class="nav-btn text-slate-400 text-xs font-bold">📦<br>Compras</button>
  <button onclick="showTab('tab-registro')" class="nav-btn text-slate-400 text-xs font-bold">📂<br>Historial</button>
</nav>

<div class="p-4 max-w-md mx-auto">

<header class="text-center py-5">
  <h1 class="text-3xl font-black text-yellow-500 italic uppercase">Bull Streaming 🐂</h1>
</header>

<section id="tab-dashboard" class="tab-content active space-y-4">
  <h2 class="text-lg font-black">📊 Dashboard</h2>
  <div id="dashboard-cards" class="grid grid-cols-2 gap-3"></div>
  <button onclick="cargarTodo()" class="w-full py-4 bg-yellow-600 rounded-2xl font-black">REFRESCAR</button>
</section>

<section id="tab-venta" class="tab-content">
  <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 space-y-4">
    <h2 class="text-lg font-black">🛒 Nueva Venta</h2>

    <select id="sel-cliente" class="input"></select>
    <select id="v-servicio" onchange="cargarInventarioDisponible()" class="input"></select>
    <select id="v-cuenta" onchange="sugerirPerfil()" class="input"></select>

    <input id="v-perfil" placeholder="Perfil: P1, P2, Completa..." class="input" />
    <input id="v-fecha-vencimiento" type="date" class="input" />
    <input id="v-ganancia" type="number" step="0.01" placeholder="Ganancia" class="input" />
    <textarea id="v-observaciones" placeholder="Observaciones" class="input h-20"></textarea>

    <button onclick="registrarVenta()" class="w-full py-4 bg-yellow-600 rounded-2xl font-black">
      REGISTRAR VENTA
    </button>
  </div>
</section>

<section id="tab-clientes" class="tab-content">
  <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 space-y-4">
    <h2 class="text-lg font-black">👤 Nuevo Cliente</h2>
    <input id="c-nombre" placeholder="Nombre" class="input" />
    <input id="c-whatsapp" placeholder="WhatsApp: 5939..." class="input" />
    <textarea id="c-observaciones" placeholder="Observaciones" class="input h-20"></textarea>
    <button onclick="guardarCliente()" class="w-full py-4 bg-indigo-600 rounded-2xl font-black">
      GUARDAR CLIENTE
    </button>
  </div>
</section>

<section id="tab-compras" class="tab-content">
  <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 space-y-4">
    <h2 class="text-lg font-black">📦 Compra a Proveedor</h2>

    <select id="comp-cuenta" class="input"></select>
    <input id="comp-proveedor" placeholder="Proveedor" class="input" />
    <label class="text-xs text-slate-400">Fecha compra</label>
    <input id="comp-fecha-compra" type="date" class="input" />
    <label class="text-xs text-slate-400">Fecha vencimiento proveedor</label>
    <input id="comp-fecha-vencimiento" type="date" class="input" />
    <textarea id="comp-observaciones" placeholder="Observaciones" class="input h-20"></textarea>

    <button onclick="registrarCompraProveedor()" class="w-full py-4 bg-emerald-600 rounded-2xl font-black">
      REGISTRAR COMPRA
    </button>
  </div>
</section>

<section id="tab-registro" class="tab-content space-y-3">
  <div class="sticky top-0 bg-slate-950 py-3 z-40">
    <h2 class="text-lg font-black mb-3">📂 Historial</h2>
    <input id="buscar" oninput="renderVentas()" placeholder="Buscar cliente, servicio, correo..." class="input" />
  </div>
  <div id="lista-ventas" class="space-y-4"></div>
</section>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxI5OLUYHl-baPQqJTz3JfaLP0df1cATY8IPcby-wNO_Rlc9P7MrgskizAvFj4m2KY/exec";

let clientes = [];
let configuracion = [];
let inventario = [];
let ventas = [];

document.querySelectorAll(".input").forEach(el => {
  el.className += " w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none text-sm";
});

window.onload = cargarTodo;

async function apiGet(action) {
  const res = await fetch(`${API_URL}?action=${action}&t=${Date.now()}`);
  return await res.json();
}

async function apiPost(payload) {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });
}

async function cargarTodo() {
  const [c, conf, inv, ven, dash] = await Promise.all([
    apiGet("getClientes"),
    apiGet("getConfiguracion"),
    apiGet("getInventario"),
    apiGet("getVentas"),
    apiGet("getDashboard")
  ]);

  clientes = c.clientes || [];
  configuracion = conf.configuracion || [];
  inventario = inv.inventario || [];
  ventas = ven.ventas || [];

  cargarClientesSelect();
  cargarServiciosSelect();
  cargarCuentasCompraSelect();
  renderVentas();
  renderDashboard(dash.dashboard || {});
}

function showTab(id) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => {
    b.classList.remove("text-yellow-500");
    b.classList.add("text-slate-400");
  });

  document.getElementById(id).classList.add("active");
  event.currentTarget.classList.remove("text-slate-400");
  event.currentTarget.classList.add("text-yellow-500");
}

function cargarClientesSelect() {
  const sel = document.getElementById("sel-cliente");
  sel.innerHTML = `<option value="">Seleccione cliente</option>`;
  clientes.forEach(c => {
    sel.innerHTML += `<option value="${c.ID_Cliente}">${c.Nombre}</option>`;
  });
}

function cargarServiciosSelect() {
  const sel = document.getElementById("v-servicio");
  sel.innerHTML = `<option value="">Seleccione servicio</option>`;
  configuracion.forEach(s => {
    sel.innerHTML += `<option value="${s.ID_Servicio}">${s.Tipo_Servicio}</option>`;
  });
}

function cargarCuentasCompraSelect() {
  const sel = document.getElementById("comp-cuenta");
  sel.innerHTML = `<option value="">Seleccione cuenta</option>`;
  inventario.forEach(c => {
    sel.innerHTML += `<option value="${c.ID_Cuenta}">${c.Correo_Cuenta || c.Correo_cuenta || ""}</option>`;
  });
}

function getServicio(idServicio) {
  return configuracion.find(s => s.ID_Servicio === idServicio);
}

function ventasActivasPorCuenta(idCuenta) {
  return ventas.filter(v => v.ID_Cuenta === idCuenta && v.Estado === "Activa");
}

function cargarInventarioDisponible() {
  const idServicio = document.getElementById("v-servicio").value;
  const servicio = getServicio(idServicio);
  const sel = document.getElementById("v-cuenta");

  sel.innerHTML = `<option value="">Seleccione cuenta disponible</option>`;

  if (!servicio) return;

  const cuentasServicio = inventario.filter(c => {
    const estado = String(c.Estado || "Activa").toLowerCase();
    return c.ID_Servicio === idServicio && estado !== "caída" && estado !== "caida" && estado !== "pausada";
  });

  cuentasServicio.forEach(cuenta => {
    const usadas = ventasActivasPorCuenta(cuenta.ID_Cuenta).length;
    const capacidad = Number(servicio.Capacidad || 1);
    const libres = capacidad - usadas;

    if (libres > 0) {
      const correo = cuenta.Correo_Cuenta || cuenta.Correo_cuenta || "";
      sel.innerHTML += `
        <option value="${cuenta.ID_Cuenta}">
          ${correo} - ${libres}/${capacidad} libre(s)
        </option>
      `;
    }
  });

  sugerirPerfil();
}

function sugerirPerfil() {
  const idCuenta = document.getElementById("v-cuenta").value;
  const idServicio = document.getElementById("v-servicio").value;
  const servicio = getServicio(idServicio);

  if (!idCuenta || !servicio) return;

  const tipo = String(servicio.Tipo_Inventario || "").toLowerCase();
  const activas = ventasActivasPorCuenta(idCuenta);

  if (tipo === "cuenta") {
    document.getElementById("v-perfil").value = "Completa";
    return;
  }

  const usados = activas.map(v => String(v.Perfil || "").toUpperCase());
  const capacidad = Number(servicio.Capacidad || 1);

  for (let i = 1; i <= capacidad; i++) {
    const perfil = "P" + i;
    if (!usados.includes(perfil)) {
      document.getElementById("v-perfil").value = perfil;
      return;
    }
  }
}

async function guardarCliente() {
  const nombre = document.getElementById("c-nombre").value.trim();
  const whatsapp = document.getElementById("c-whatsapp").value.trim();

  if (!nombre) return alert("Falta nombre");

  await apiPost({
    action: "addCliente",
    nombre,
    whatsapp,
    observaciones: document.getElementById("c-observaciones").value
  });

  alert("Cliente guardado");
  document.getElementById("c-nombre").value = "";
  document.getElementById("c-whatsapp").value = "";
  document.getElementById("c-observaciones").value = "";
  cargarTodo();
}

async function registrarVenta() {
  const idCliente = document.getElementById("sel-cliente").value;
  const idServicio = document.getElementById("v-servicio").value;
  const idCuenta = document.getElementById("v-cuenta").value;
  const perfil = document.getElementById("v-perfil").value.trim();
  const fechaVencimiento = document.getElementById("v-fecha-vencimiento").value;
  const ganancia = document.getElementById("v-ganancia").value;

  if (!idCliente || !idServicio || !idCuenta || !perfil || !fechaVencimiento) {
    return alert("Completa cliente, servicio, cuenta, perfil y vencimiento");
  }

  const servicio = getServicio(idServicio);
  const cuenta = inventario.find(c => c.ID_Cuenta === idCuenta);
  const correoCuenta = cuenta.Correo_Cuenta || cuenta.Correo_cuenta || "";

  await apiPost({
    action: "registrarVenta",
    idCliente,
    idCuenta,
    plataforma: servicio.Plataforma,
    servicioEntregado: servicio.Tipo_Servicio,
    perfil,
    correoCuenta,
    fechaVencimiento,
    ganancia,
    observaciones: document.getElementById("v-observaciones").value
  });

  alert("Venta registrada");
  document.getElementById("v-perfil").value = "";
  document.getElementById("v-fecha-vencimiento").value = "";
  document.getElementById("v-ganancia").value = "";
  document.getElementById("v-observaciones").value = "";
  cargarTodo();
}

async function registrarCompraProveedor() {
  const idCuenta = document.getElementById("comp-cuenta").value;
  const proveedor = document.getElementById("comp-proveedor").value.trim();
  const fechaCompra = document.getElementById("comp-fecha-compra").value;
  const fechaVencimiento = document.getElementById("comp-fecha-vencimiento").value;

  if (!idCuenta || !proveedor || !fechaCompra || !fechaVencimiento) {
    return alert("Completa cuenta, proveedor y fechas");
  }

  await apiPost({
    action: "registrarCompraProveedor",
    idCuenta,
    proveedor,
    fechaCompra,
    fechaVencimiento,
    observaciones: document.getElementById("comp-observaciones").value
  });

  alert("Compra registrada");
  cargarTodo();
}

function renderDashboard(d) {
  const cont = document.getElementById("dashboard-cards");
  cont.innerHTML = `
    ${card("Clientes activos", d.clientesActivos || 0)}
    ${card("Ventas activas", d.ventasActivas || 0)}
    ${card("Ganancia total", "$" + Number(d.gananciaTotal || 0).toFixed(2))}
    ${card("Por vencer", d.porVencer || 0)}
    ${card("Vencidas", d.vencidas || 0)}
    ${card("Cuentas inventario", inventario.length)}
  `;
}

function card(titulo, valor) {
  return `
    <div class="bg-slate-900 border border-slate-800 p-4 rounded-3xl">
      <p class="text-[10px] text-slate-400 uppercase font-black">${titulo}</p>
      <p class="text-2xl font-black text-yellow-500">${valor}</p>
    </div>
  `;
}

function renderVentas() {
  const cont = document.getElementById("lista-ventas");
  const q = document.getElementById("buscar")?.value?.toLowerCase() || "";

  const lista = ventas
    .filter(v => JSON.stringify(v).toLowerCase().includes(q))
    .sort((a, b) => new Date(b.Fecha_Registro) - new Date(a.Fecha_Registro));

  if (!lista.length) {
    cont.innerHTML = `<p class="text-center text-slate-500 py-10">Sin ventas</p>`;
    return;
  }

  cont.innerHTML = lista.map(v => {
    const cliente = clientes.find(c => c.ID_Cliente === v.ID_Cliente) || {};
    const fecha = new Date(v.Fecha_Vencimiento);
    const hoy = new Date();
    const diff = Math.ceil((fecha - hoy) / (1000 * 60 * 60 * 24));

    let color = "border-slate-800";
    let estado = "Activa";
    if (v.Estado !== "Activa") {
      color = "border-slate-700 opacity-60";
      estado = v.Estado;
    } else if (diff <= 0) {
      color = "border-red-600 bg-red-950/30";
      estado = "Vencida";
    } else if (diff <= 3) {
      color = "border-yellow-500 bg-yellow-500/10";
      estado = `Vence en ${diff} día(s)`;
    }

    const msg = encodeURIComponent(
      `Hola ${cliente.Nombre || ""}, Bull Streaming te informa que tu ${v.Servicio_Entregado} (${v.Correo_Cuenta} / ${v.Perfil}) vence el ${formatoFecha(v.Fecha_Vencimiento)}. ¿Deseas renovar?`
    );

    return `
      <div class="bg-slate-900 border-l-8 ${color} p-4 rounded-3xl">
        <div class="flex justify-between gap-2">
          <div>
            <h3 class="font-black">${cliente.Nombre || v.ID_Cliente}</h3>
            <p class="text-yellow-500 text-xs font-black">${v.Servicio_Entregado || v.Plataforma}</p>
          </div>
          <span class="text-xs font-black">${estado}</span>
        </div>

        <div class="text-xs text-slate-300 mt-3 space-y-1">
          <p><b>Cuenta:</b> ${v.Correo_Cuenta}</p>
          <p><b>Perfil:</b> ${v.Perfil}</p>
          <p><b>Vence:</b> ${formatoFecha(v.Fecha_Vencimiento)}</p>
          <p><b>Ganancia:</b> $${Number(v.Ganancia || 0).toFixed(2)}</p>
          <p><b>Tipo:</b> ${v.Tipo_Movimiento}</p>
        </div>

        <div class="grid grid-cols-3 gap-2 mt-4">
          <button onclick="renovarVenta('${v.ID_Venta}')" class="py-3 bg-indigo-600 rounded-xl text-[10px] font-black">RENOVAR</button>
          <button onclick="liberarVenta('${v.ID_Venta}')" class="py-3 bg-slate-700 rounded-xl text-[10px] font-black">LIBERAR</button>
          <a href="https://wa.me/${cliente.WhatsApp || ""}?text=${msg}" target="_blank" class="py-3 bg-green-600 rounded-xl text-[10px] font-black text-center">WHATSAPP</a>
        </div>
      </div>
    `;
  }).join("");
}

async function renovarVenta(idVenta) {
  const venta = ventas.find(v => v.ID_Venta === idVenta);
  if (!venta) return;

  const fecha = prompt("Nueva fecha vencimiento AAAA-MM-DD:");
  if (!fecha) return;

  const ganancia = prompt("Ganancia de renovación:");
  if (ganancia === null) return;

  await apiPost({
    action: "renovarVenta",
    idCliente: venta.ID_Cliente,
    idCuenta: venta.ID_Cuenta,
    plataforma: venta.Plataforma,
    servicioEntregado: venta.Servicio_Entregado,
    perfil: venta.Perfil,
    correoCuenta: venta.Correo_Cuenta,
    fechaVencimiento: fecha,
    ganancia,
    observaciones: "Renovación desde la web"
  });

  alert("Renovación registrada");
  cargarTodo();
}

async function liberarVenta(idVenta) {
  if (!confirm("¿Liberar esta venta/perfil?")) return;

  await apiPost({
    action: "liberarVenta",
    idVenta,
    observaciones: "Liberado desde la web"
  });

  alert("Liberado");
  cargarTodo();
}

function formatoFecha(f) {
  if (!f) return "";
  const d = new Date(f);
  if (isNaN(d)) return f;
  return d.toLocaleDateString("es-EC");
}
</script>

</body>
</html>
