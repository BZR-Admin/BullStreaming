<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bull Streaming</title>

  <link rel="stylesheet" href="stylebull.css" />

  <!-- =========================
       SUPABASE SDK
  ========================== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

  <!-- =========================
       SIDEBAR
  ========================== -->
  <aside class="sidebar">

    <div class="logo-box">
      <h1>Bull Streaming</h1>
      <p>Panel de gestión</p>
    </div>

    <button id="btnMenuMovil" class="btn-menu-movil">☰ Menú</button>

    <nav class="menu" id="menuPrincipal">

      <button data-pantalla="inicio" class="activo">Inicio</button>
      <button data-pantalla="venta">Venta</button>
      <button data-pantalla="compra">Compra cuenta propia</button>
      <button data-pantalla="registro-ventas">Registro ventas</button>
      <button data-pantalla="registro-compras">Registro compras</button>
      <button data-pantalla="cuentas">Cuentas disponibles</button>
      <button data-pantalla="clientes">Clientes</button>
      <button data-pantalla="proveedores">Proveedores</button>

    </nav>

  </aside>


  <!-- =========================
       MAIN CONTENT
  ========================== -->
  <main>

    <!-- INICIO -->
    <section id="inicio" class="pantalla">
      <h2>Dashboard</h2>
      <div id="dashboard"></div>
    </section>

    <!-- VENTA -->
    <section id="venta" class="pantalla oculto">
      <h2>Ventas</h2>
      <div id="contenedorVentas"></div>
      <table>
        <tbody id="tablaVentas"></tbody>
      </table>
    </section>

    <!-- COMPRA -->
    <section id="compra" class="pantalla oculto">
      <h2>Compras</h2>
      <div id="contenedorCompras"></div>
      <table>
        <tbody id="tablaCompras"></tbody>
      </table>
    </section>

    <!-- REGISTRO VENTAS -->
    <section id="registro-ventas" class="pantalla oculto">
      <h2>Registro Ventas</h2>
      <table>
        <tbody id="tablaRegistroVentas"></tbody>
      </table>
    </section>

    <!-- REGISTRO COMPRAS -->
    <section id="registro-compras" class="pantalla oculto">
      <h2>Registro Compras</h2>
      <table>
        <tbody id="tablaRegistroCompras"></tbody>
      </table>
    </section>

    <!-- CUENTAS -->
    <section id="cuentas" class="pantalla oculto">
      <h2>Cuentas disponibles</h2>
      <div id="contenedorCuentas"></div>
    </section>

    <!-- =========================
         CLIENTES (SIN DUPLICADOS)
    ========================== -->
    <section id="clientes" class="pantalla oculto">
      <h2>Clientes</h2>

      <input id="cliente_nombre" placeholder="Nombre">
      <input id="cliente_whatsapp" placeholder="WhatsApp">
      <button onclick="saveCliente()">Guardar</button>

      <table>
        <tbody id="tablaClientes"></tbody>
      </table>
    </section>


    <!-- =========================
         PROVEEDORES (SIN DUPLICADOS)
    ========================== -->
    <section id="proveedores" class="pantalla oculto">
      <h2>Proveedores</h2>

      <input id="proveedor_nombre" placeholder="Proveedor">
      <input id="proveedor_whatsapp" placeholder="WhatsApp">
      <button onclick="saveProveedor()">Guardar</button>

      <table>
        <tbody id="tablaProveedores"></tbody>
      </table>
    </section>

  </main>


  <!-- =========================
       SUPABASE CONFIG
  ========================== -->
  <script src="supabase.js"></script>

  <!-- =========================
       MÓDULOS (ORDEN LIMPIO)
  ========================== -->
  <script src="clientessp.js"></script>
  <script src="proveedoressp.js"></script>
  <script src="comprassp.js"></script>
  <script src="cuentassp.js"></script>
  <script src="ventassp.js"></script>

  <script src="dashboard.js"></script>
  <script src="mainsp.js"></script>

</body>
</html>
