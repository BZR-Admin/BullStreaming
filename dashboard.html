<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Bull Streaming</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <meta name="theme-color" content="#00c6ff" />
  <script>
    if ("serviceWorker" in navigator)
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
  </script>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

<!-- FAB -->
<button id="fab" type="button">☰</button>

<!-- MENÚ -->
<nav id="sideMenu" class="side-menu">
  <button onclick="location.href='index.html'">🏠 Inicio</button>
  <button onclick="location.href='ventas.html'">🛒 Ventas</button>
  <button onclick="location.href='compras.html'">📦 Compras</button>
  <button onclick="location.href='cuentas.html'">🎬 Cuentas</button>
  <button onclick="location.href='registros.html'">📊 Registros</button>
  <button onclick="location.href='clientes_proveedores.html'">👥 Clientes</button>
  <button onclick="location.href='dashboard.html'">📈 Dashboard</button>
</nav>

<!-- HEADER -->
<header class="dash-header">
  <h2>Dashboard <span class="dash-badge">Live</span></h2>
  <p>Resumen de Bull Streaming</p>
</header>

<!-- KPI GRID: 5 tarjetas en un solo grid -->
<div class="kpi-grid">

  <div class="kpi-card cyan">
    <div class="kpi-icon">🛒</div>
    <div class="kpi-body">
      <span class="kpi-label">Ventas activas</span>
      <span class="kpi-value" id="kpiVentas">—</span>
    </div>
  </div>

  <div class="kpi-card purple">
    <div class="kpi-icon">👥</div>
    <div class="kpi-body">
      <span class="kpi-label">Clientes únicos</span>
      <span class="kpi-value" id="kpiClientes">—</span>
    </div>
  </div>

  <div class="kpi-card green">
    <div class="kpi-icon">📅</div>
    <div class="kpi-body">
      <span class="kpi-label">Ventas hoy</span>
      <span class="kpi-value" id="kpiHoy">—</span>
    </div>
  </div>

  <div class="kpi-card yellow">
    <div class="kpi-icon">💰</div>
    <div class="kpi-body">
      <span class="kpi-label">Ganancia del mes</span>
      <span class="kpi-value" id="kpiGananciaMes">—</span>
    </div>
  </div>

  <div class="kpi-card pink">
    <div class="kpi-icon">💵</div>
    <div class="kpi-body">
      <span class="kpi-label">Ganancia de hoy</span>
      <span class="kpi-value" id="kpiGananciaHoy">—</span>
    </div>
  </div>

</div>

<!-- TOP PLATAFORMAS -->
<section class="dash-section">
  <h3 class="section-title">🏆 Top plataformas</h3>
  <div id="topPlataformas" class="platform-list"></div>
</section>

<!-- GRÁFICO -->
<section class="dash-section">
  <div class="chart-header">
    <h3 class="section-title">📈 Ventas registradas</h3>
    <div class="chart-toggle">
      <button id="btn7d" class="toggle-btn active" onclick="setChart('7d')">7 días</button>
      <button id="btnMes" class="toggle-btn" onclick="setChart('mes')">Meses</button>
    </div>
  </div>
  <div class="chart-wrap">
    <canvas id="chartVentas"></canvas>
  </div>
</section>

<!-- Chart.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="module" src="dashboard.js"></script>

<script>
  // FAB menu
  const fab = document.getElementById("fab");
  const menu = document.getElementById("sideMenu");
  fab.onclick = () => menu.style.display = menu.style.display === "flex" ? "none" : "flex";
  document.addEventListener("click", e => {
    if (!menu.contains(e.target) && !fab.contains(e.target)) menu.style.display = "none";
  });
</script>

</body>
</html>
